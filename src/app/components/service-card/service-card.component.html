        <img [src]="service.image"

        <div class="flex flex-col gap-[10px]">

            <h5 class="text-[24px] leading-[33.6px] tracking-[-0.8px] font-[500] text-[#001305]">

            <p class="text-[16px] leading-[28.8px] tracking-[-0.2px] font-[400] text-[#676565]">
                {{service.description}}
            </p>

        </div>

    </div>
